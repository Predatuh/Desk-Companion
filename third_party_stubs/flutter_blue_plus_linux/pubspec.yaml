name: flutter_blue_plus_linux
description: Local stub package for Android-only builds.
version: 7.0.3
publish_to: 'none'

environment:
  sdk: ^3.6.0
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

flutter:
  plugin:
    platforms:
      linux:
        pluginClass: FlutterBluePlusLinux