name: path_provider_windows
description: Local stub package for Android-only builds.
version: 2.3.0
publish_to: 'none'

environment:
  sdk: ^3.6.0
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

flutter:
  plugin:
    platforms:
      windows:
        pluginClass: PathProviderWindows